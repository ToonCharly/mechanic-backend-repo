databases:
  - name: mechanic-db
    databaseName: mechanic_db
    user: mechanic_user
    plan: free

services:
  - type: web
    name: mechanic-backend
    env: go
    plan: free
    rootDir: backend
    buildCommand: "go build -o main ./cmd/api"
    startCommand: "./main"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mechanic-db
          property: connectionString
      - key: PORT
        value: "10000"
      - key: GIN_MODE
        value: "release"

