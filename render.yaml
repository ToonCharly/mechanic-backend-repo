databases:
  - name: mechanic-db
    databaseName: mechanic_db
    user: mechanic_user
    plan: free
    version: "13"

services:
  - type: web
    name: mechanic-backend
    env: go
    plan: free
    repo: https://github.com/ToonCharly/mechanic-backend-repo
    branch: main
    buildFilter:
      paths:
      - backend/**
    build:
      command: "go build -o main ./backend/cmd/api"
    startCommand: "./main"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mechanic-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: GIN_MODE
        value: release
